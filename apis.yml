aid: customer-portals
name: Customer Portals
description: >-
  Customer Portals is the topic dedicated to the architecture, APIs, schemas, and
  reference designs behind self-service customer portals. A customer portal is a
  secure web or mobile experience where authenticated customers can manage their
  profile, view orders and invoices, pay bills, submit and track support tickets,
  download documents, manage notification preferences, and access account-specific
  resources. Modern customer portals are typically composed of multiple back-end
  APIs - authentication and identity, profile and preference management, billing
  and invoicing, support and ticketing, notifications, and document delivery -
  surfaced through a single front-end shell. This repository tracks the vendors,
  patterns, and standards that make customer portals reliable, accessible, and API-driven.
